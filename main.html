		<ul role='list'>
			<li role='listitem'>Sugar</li>
			<li role='listitem'>Water</li>
			<li role='listitem'>Milk</li>
			<li role='listitem'>Ginger</li>
			<li role='listitem'>Cardamom</li>
			<li role='listitem'>Tea Powder</li>
		</ul>
	<img src='#tea' alt='Tea' role='img' />
	<nav role='navigation'>
		<summary>
			Boil 1 cup of water with crushed ginger and cardamom.
			Add 2 teaspoons of CTC tea powder and 2–3 teaspoons of sugar.
			Simmer for 2 minutes, pour in 1 cup of milk, let it reach a rolling boil,
			and then strain.
